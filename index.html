<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBLOX COMBO GEN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --red: #ff0033;
            --dark: #0a0a0a;
            --gray: #1f1f1f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0000 100%);
            color: #fff;
            min-height: 100vh;
            padding: 40px 20px;
            background-attachment: fixed;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--gray);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(255, 0, 51, 0.15);
            border: 1px solid #330011;
        }

        header {
            background: linear-gradient(to right, #330011, #660022);
            padding: 30px 40px;
            text-align: center;
            border-bottom: 3px solid var(--red);
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -2px;
            color: white;
            text-transform: uppercase;
        }

        .subtitle {
            color: #ff6666;
            margin-top: 8px;
            font-size: 18px;
        }

        .main {
            padding: 40px;
        }

        textarea {
            width: 100%;
            background: #0f0f0f;
            border: 2px solid #330011;
            color: #fff;
            font-family: monospace;
            font-size: 16px;
            padding: 18px;
            border-radius: 12px;
            resize: vertical;
            min-height: 160px;
            outline: none;
            transition: all 0.3s;
        }

        textarea:focus {
            border-color: var(--red);
            box-shadow: 0 0 0 4px rgba(255, 0, 51, 0.2);
        }

        .controls {
            margin: 25px 0;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--red);
            color: white;
            flex: 1;
        }

        .btn-primary:hover {
            background: #ff3355;
            transform: translateY(-3px);
        }

        .btn-secondary {
            background: #330011;
            color: #ff9999;
        }

        .btn-secondary:hover {
            background: #440022;
            transform: translateY(-3px);
        }

        .results {
            margin-top: 30px;
        }

        .section {
            margin-bottom: 35px;
        }

        .section h3 {
            color: var(--red);
            margin-bottom: 12px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .combo-box {
            background: #0a0a0a;
            border: 2px solid #330011;
            border-radius: 12px;
            padding: 20px;
            max-height: 420px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 15px;
            line-height: 1.5;
            color: #ffdddd;
        }

        .stats {
            text-align: center;
            padding: 12px;
            background: #1a0000;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            color: var(--red);
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #551111;
            font-size: 14px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--red);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>COMBO GEN</h1>
            <p class="subtitle">Roblox Username:Password Generator</p>
        </header>

        <div class="main">
            <textarea id="usernames" placeholder="Enter usernames...&#10;One per line"></textarea>

            <div class="controls">
                <button class="btn-primary" onclick="generate()">⚡ GENERATE COMBOS</button>
                <button class="btn-secondary" onclick="saveToFile()">💾 Save to File</button>
                <button class="btn-secondary" onclick="copyJSON()">📋 Copy JSON</button>
            </div>

            <div class="results">
                <div class="section">
                    <h3>✅ Generated Combos</h3>
                    <div class="combo-box" id="comboList">Click Generate to start...</div>
                    <div class="stats" id="count">Total: 0 combos</div>
                </div>

                <div class="section">
                    <h3>📡 API Response</h3>
                    <pre id="output" style="background:#0a0a0a; padding:20px; border-radius:12px; font-size:13px; max-height:300px; overflow:auto;">Waiting for generation...</pre>
                </div>
            </div>
        </div>

        <div class="footer">
            Powered by your Vercel API • Made for fast combo generation
        </div>
    </div>

    <script>
        async function generate() {
            const text = document.getElementById('usernames').value.trim();
            if (!text) return alert("Please enter at least one username");

            const usernames = text.split('\n').map(u => u.trim()).filter(Boolean);

            try {
                const res = await fetch('/api/combos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usernames })
                });

                const data = await res.json();
                document.getElementById('output').textContent = JSON.stringify(data, null, 2);

                // Display clean username:password
                let allCombos = [];
                if (data.combos) {
                    Object.values(data.combos).forEach(arr => {
                        allCombos = allCombos.concat(arr);
                    });
                }

                document.getElementById('comboList').textContent = allCombos.join('\n');
                document.getElementById('count').textContent = `Total: ${allCombos.length} combos`;
            } catch (err) {
                alert("Error connecting to API. Make sure your backend is running.");
            }
        }

        function saveToFile() {
            const content = document.getElementById('comboList').textContent.trim();
            if (!content || content === "Click Generate to start...") {
                return alert("Generate combos first");
            }

            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `roblox_combos_${new Date().toISOString().slice(0,10)}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function copyJSON() {
            const content = document.getElementById('output').textContent;
            if (content && content !== "Waiting for generation...") {
                navigator.clipboard.writeText(content);
                alert("✅ JSON copied to clipboard!");
            }
        }
    </script>
</body>
</html>
